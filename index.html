<style>
/* COOKIE BANNER */
#cookie-banner{
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #111;
    color: #fff;
    padding: 15px 20px;
    border-radius: 10px;
    display: flex;
    gap: 20px;
    z-index: 9999;
}

#cookie-banner button{
    padding: 6px 12px;
    cursor: pointer;
}

#accept{
    background: gold;
}

#decline{
    background: gray;
}

/* FOOTER */
.footer{
    background: #0a0a0a;
    color: #ccc;
    padding: 30px;
    text-align: center;
}
</style>

<body>

<div class="wrapper">

<!-- TOT CODUL TĂU RĂMÂNE EXACT LA FEL -->
<!-- nu mai repet tot pentru că nu l-am modificat -->

</div>

<!-- 🔥 FOOTER CORECT -->
<footer class="footer">
    <p>© 2026 Beach Please Tanning Studio</p>
    <p><a href="cookies.html" style="color:#d4af37;">Politica Cookies</a></p>
</footer>

<!-- 🔥 COOKIE BANNER -->
<div id="cookie-banner">
    <span>Acest site folosește cookies</span>
    <button id="accept">Accept</button>
    <button id="decline">Refuz</button>
</div>

<!-- 🔥 SCRIPT -->
<script>
window.onload = function(){
    const banner = document.getElementById("cookie-banner");

    if(localStorage.getItem("cookieChoice")){
        banner.style.display = "none";
    }

    document.getElementById("accept").onclick = function(){
        localStorage.setItem("cookieChoice","accepted");
        banner.style.display = "none";
    }

    document.getElementById("decline").onclick = function(){
        localStorage.setItem("cookieChoice","declined");
        banner.style.display = "none";
    }
}
</script>

</body>
